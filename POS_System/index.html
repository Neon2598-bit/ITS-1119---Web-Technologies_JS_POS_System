<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System</title>
    <link rel="stylesheet" href="../POS_System/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

<!-- ================================= LOGIN PAGE HTML STRUCTURE START ======================================== -->

    <section id="loginSection">
        <div id="flexContainer">
            <div id = "gridContainer">
                <header id="containerHeader">
                    <h1>E - Inventory</h1>
                    <h4>Inventory Management System</h4>
                </header>

                <div id="loginFormDetails">
                    <h1>Login</h1>

                    <div id="inputContainer">

                        <div id="emailHolder"><i class="fa-solid fa-circle-user fa-2xl"
                                style="color: rgb(255, 212, 59);"></i><input type="email" id="emailInput"
                                placeholder="Email Address"></div>


                        <div id="passwordHolder"><i class="fa-solid fa-lock fa-2xl"
                                style="color: rgb(255, 212, 59);"></i><input type="password" id="passwordInput"
                                placeholder="Password"></div>

                    </div>


                    <button id="btnLogin" type="button" class="btn">
                        <strong>LOG IN</strong>
                        <div id="container-stars">
                            <div id="stars"></div>
                        </div>
                        <div id="glow">
                            <div class="circle"></div>
                            <div class="circle"></div>
                        </div>
                    </button>
                </div>
            </div>
        </div>
    </section>

<!-- ================================= LOGIN PAGE HTML STRUCTURE END ========================================= -->

<!-- ================================ DASHBOARD HTML STRUCTURE START ========================================= -->

    <section id = "dashboardSection">

        <nav id="dashboardNav">

            <div id = "navBrand">
                <div id = "dashboardLogo"></div>
            </div>

            <ul id = "navLinks">
                <li><a href="#" id="dashboardLink" class = "navLink active" data-page="dashboard">Dashboard</a></li>
                <li><a href="#" id="customerLink" class = "navLink" data-page="customers">Customers</a></li>
                <li><a href="#" id="itemsLink" class = "navLink" data-page="products">Products</a></li>
                <li><a href="#" id="orderLink" class = "navLink" data-page="orders">Orders</a></li>
                <li><a href="#" id="orderHistoryLink" class = "navLink" data-page="history">History</a></li>
            </ul>

            <button id="btnLogOut" type="button" class="btn">
                <strong>LOG IN</strong>
                <div id="container-stars01">
                    <div id="stars01"></div>
                </div>
                <div id="glow01">
                    <div class="circle"></div>
                    <div class="circle"></div>
                </div>
            </button>

        </nav>

        <main id = "dashboardMain"></main>


    </section>



<!-- ====================================== JS SCRIPTS =============================================== -->
    <script src="/POS_System/assets/lib/jquery-4.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.js"></script>
    <script src="/POS_System/assets/js/model.js"></script>
    <script src="/POS_System/assets/js/view.js"></script>
    <script src="/POS_System/assets/js/app.js"></script>
</body>

</html>
